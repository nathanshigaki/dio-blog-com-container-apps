<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar post</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4">Criar novo post</h1>
        <form action="postForm">
            <div class="mb-3">
                <label for="title" class="form-label">Titulo</label>
                <input type="text" class="form-control" id="title" required>
            </div>
            <div class="mb-3">
                <label for="content" class="form-label">Conteudo</label>
                <textarea class="form-control" id="content" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-success">Salvar post</button>
            <a href="index.html" class="btn btn-secondary ms-2">Voltar</a>
        </form>
    </div>
    <script>
        function getPosts(){
            const posts = localStorage.getItem('posts');
            return posts ? JSON.parse(posts) : [];
        }

        function savePosts(posts){
            localStorage.setItem('posts', JSON.stringify(posts));
        }

        document.getElementById('postForm').addEventListener('submit', function(e){
            e.preventDefault();
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const posts = getPosts();

            const newPost ={
                id: Date.now(),
                title: title,
                content: content
            };

            posts.push(newPost);
            savePosts(posts);
            window.location.href = 'index.html';
        })
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
