<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhe de post</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <a href="index.html" class="btn btn-secondary mb-4">Voltar</a>
        <div id="postContent" class="mb-5"></div>
        <h3>Comentarios</h3>
        <div id="Comments" class="list-group mb-4"></div>
        <form action="comment-form">
            <div class="mb-3">
                <label for="comment" class="form-label">Adicionar comentario</label>
                <textarea name="form-control" id="comment" rows="3" required></textarea>
            </div>
            <button type="submit" class="btn btn-success">Enviar comentario</button>
        </form>
    </div>
    <script>
        function getQueryParam(param){
            const urlParam = new URLSearchParams(window.location.search);
            return urlParam.get(param);
        }

        function getPosts(){
            const posts = localStorage.getItem('posts');
            return posts ? JSON.parse(posts) : [];
        }

        function getComments(){
            const comments = localStorage.getItem('comments');
            return comments ? JSON.parse(comments) : [];
        }

        function saveComments(comments){
            localStorage.setItem('comments', JSON.stringify(comments));
        }

        function renderPost(){
            const postId = parseInt(getQueryParam('id'));
            const posts = getPosts();
            const post = posts.find(p =>p.id === postId);
            const postContainer = document.getElementById('postContent');
            if (post) {
                postContainer.innerHTML = `<h1>${post.title}</h1>
                                           <p>${post.content}</p>`;
            } else {
                postContainer.innerHTML = `<p class="text-danger">Post não encontrado</p>`;
            }
        }

        function renderComments(){
            const postId = parseInt(getQueryParam('id'));
            const comments = getComments().filter(c => c.postId === postId);
            const commentsContainer = document.getElementById('comments');
            commentsContainer.innerHTML = '';
            if (comments.length === 0) {
                commentsContainer.innerHTML = `<p class="text-muted">Nenhum comentario ainda.</p>`;
            } else {
                comments.forEach(comment => {
                    const commentItem = document.createElement('div');
                    commentItem.className = "list-group-item";
                    commentItem.textContent = comment.text;
                    commentsContainer.appendChild(commentItem);
                });
            }
        }

        document.getElementById('comment-form').addEventListener('submit',function(e){
            e.preventDefault();
            const commentText = document.getElementById('comment').value;
            const postId = parseInt(getQueryParam('id'));
            const comments = getComments();
            const newComment = {
                id: Date.now(),
                postId: postId,
                text: commentText
            };
            comments.push(newComment);
            saveComments(comments);
            document.getElementById('document').value = '';
            renderComments();
        })

        document.addEventListener('DOMContentLoaded', function(){
            renderPost();
            renderComments();
        })
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
